name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying Application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Asumsi project ini ditaruh di /var/www/food-allergy-scanner di server
            cd /var/www/food-allergy-scanner
            
            # Tarik kode terbaru dari GitHub
            git pull origin main
            
            # Update dependencies Backend
            echo "Updating Backend..."
            cd backend
            npm install
            
            # Buat file .env secara otomatis
            echo "Menyiapkan file .env..."
            echo "PORT=8080" > .env
            echo "DATABASE_URL=\"file:./allergy.db\"" >> .env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            
            # Setup Database Prisma
            echo "Setting up Database..."
            npx prisma generate
            npx prisma db push
            
            # Update dependencies & Build Frontend (React/Vite)
            echo "Updating Frontend..."
            cd ../frontend
            npm install
            
            echo "Menyiapkan file .env frontend..."
            echo "VITE_API_URL=http://157.230.249.51:81/api" > .env
            
            npm run build
            
            # Restart backend di PM2
            echo "Restarting PM2 services..."
            pm2 restart all
            pm2 save
